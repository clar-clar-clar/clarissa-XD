<html>
<head>
    <title>Form Sederhana</title>
    <link rel="stylesheet" href="formativeformnobel.css">
</head>
    <div class="container">
		<h2> Formulir Pendaftaran </h2>
	<div class="container">
	    <div class="result" id="hasil">
            Data akan muncul di sini...
        </div>
	</div>

			<label>Nama lengkap*</label>
				<input type="text" id="nama" placeholder="masukkan nama"> 

			<label>Kelas / Tingkatan*</label>
				<input type="text" id="kelas" placeholder="SD/SMP/SMA">
<div class="container">
			<label>Jenis Kelamin*</label>
				<input type="radio" name="gender" value="Laki-laki"> Laki-laki
				<input type="radio" name="gender" value="Perempuan"> Perempuan
				<input type="radio" name="gender" value="Lainnya"> Lainnya </div>
<div class="container">
			<label>Ekstrakurikuler</label>
				<input type="checkbox" name="eks" value="Basket"> Basket
				<input type="checkbox" name="eks" value="Futsal"> Futsal
				<input type="checkbox" name="eks" value="Paduan Suara"> Paduan Suara </div>
<div class="container">
			<label>Pilih Jadwal*</label>
				<input type="radio" name="jadwal" value="Pagi"> Pagi
				<input type="radio" name="jadwal" value="Siang"> Siang
				<input type="radio" name="jadwal" value="Sore"> Sore
				<input type="radio" name="jadwal" value="Campuran"> Campuran </div>

			<br><br>
				<button id="tampilkanBtn">Tampilkan Data</button>
				<button id="tampilkanBtn">reset </button>
	</div>

    <script src="formativeformnobel.js"></script>
</body>
</html>
